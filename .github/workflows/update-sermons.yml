name: Update CCI Sermons

on:
  # Runs every Monday at 9am UTC (new sermons typically uploaded after Sunday service)
  schedule:
    - cron: "0 9 * * 1,4"
  # Also runs every Thursday at 9am (midweek services)
  #   - cron: "0 9 * * 4"
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cci-sermons-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes before scraping
        run: git pull --ff-only origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run CCI sermon scraper
        run: |
          if [ -n "$YOUTUBE_API_KEY" ]; then
            node cci-sermons-scraper.js --youtube-key "$YOUTUBE_API_KEY"
          else
            node cci-sermons-scraper.js
          fi
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Show summary
        run: |
          echo "=== Scrape complete ==="
          if [ -f cci-sermons-all.json ]; then
            echo "Sermons in library: $(node -e "console.log(require('./cci-sermons-all.json').length)")"
          fi
          if [ -f cci-sermons-grouped.json ]; then
            echo "Topic groups:"
            node -e "
              const g = require('./cci-sermons-grouped.json');
              g.forEach(grp => console.log('  ' + grp.label + ': ' + grp.sermons.length));
            "
          fi

      - name: Commit updated sermon data
        run: |
          git config user.name "CCI Sermons Bot"
          git config user.email "actions@github.com"

          git add index.html cci-sermons-all.json cci-sermons-grouped.json cci-sermons-log.txt

          if git diff --cached --quiet; then
            echo "No sermon changes to commit."
            exit 0
          fi

          git commit -m "chore: auto-update sermon library (${{ github.run_id }})"
          git pull --rebase origin main
          git push origin HEAD:main
