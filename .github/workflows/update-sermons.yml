name: Update CCI Sermons

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update sermon data
        run: node cci-sermons-scraper.js

      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update sermon data
          file_pattern: index.html cci-sermons-all.json cci-sermons-grouped.json cci-sermons-log.txt
